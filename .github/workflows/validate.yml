# =============================================================================
# validate.yml — Syntax validation for every push and pull request
# =============================================================================
# Runs three checks automatically:
#   1. bash -n  — Shell script syntax (all .sh files)
#   2. ansible-playbook --syntax-check  — Ansible playbooks
#   3. packer validate  — Packer HCL templates
#
# These checks catch typos and syntax errors before they reach your lab.
# No credentials are needed — syntax checks don't connect to anything.
# =============================================================================

name: Validate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Shell script syntax check (bash -n)
  # ---------------------------------------------------------------------------
  bash-syntax:
    name: Shell script syntax (bash -n)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all .sh files
        run: |
          echo "Checking shell scripts..."
          FAIL=0
          while IFS= read -r f; do
            if bash -n "$f" 2>/tmp/bash_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/bash_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 2: Ansible syntax check
  # ---------------------------------------------------------------------------
  ansible-syntax:
    name: Ansible playbook syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ansible
          ansible --version

      - name: Check all playbooks
        run: |
          REPO="$(pwd)"
          FAIL=0
          while IFS= read -r f; do
            if ANSIBLE_ROLES_PATH="$REPO/automation/ansible/roles" \
               ansible-playbook --syntax-check "$f" 2>/tmp/ans_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/ans_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find automation/ansible/playbooks -name "*.yml" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 3: Packer validate
  # ---------------------------------------------------------------------------
  packer-validate:
    name: Packer template validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Validate all Packer templates
        # Each template is validated in its own isolated temp directory.
        # This is necessary because Packer HCL merges ALL .pkr.hcl files in a
        # directory together — if we run 'packer init .' with all templates
        # present, locals defined in each file (timestamp, image_name) clash.
        # Isolating one template + variables.pkr.hcl per validation run avoids
        # this and matches how the templates are actually used (one at a time).
        working-directory: automation/packer
        run: |
          FAIL=0
          PLUGIN_CACHE=$(mktemp -d)
          export PACKER_PLUGIN_PATH="$PLUGIN_CACHE"

          for template in ubuntu-*.pkr.hcl; do
            echo ""
            echo "── Validating $template ──"

            # Copy this template + shared files into an isolated directory
            TDIR=$(mktemp -d)
            cp variables.pkr.hcl  "$TDIR/"
            cp "$template"        "$TDIR/"
            cp -r environments    "$TDIR/"
            [ -d http ] && cp -r http "$TDIR/"

            # Init installs the plugin(s) needed by this template.
            # PACKER_PLUGIN_PATH is shared so each plugin is only downloaded once.
            if ! packer init "$TDIR" 2>/tmp/packer_err; then
              echo "  ✘  $template (init failed)"
              cat /tmp/packer_err
              FAIL=$((FAIL + 1))
              rm -rf "$TDIR"
              continue
            fi

            if packer validate \
                 -var-file="$TDIR/environments/homelab.pkrvars.hcl" \
                 "$TDIR" 2>/tmp/packer_err; then
              echo "  ✔  $template"
            else
              echo "  ✘  $template"
              cat /tmp/packer_err
              FAIL=$((FAIL + 1))
            fi

            rm -rf "$TDIR"
          done

          rm -rf "$PLUGIN_CACHE"
          echo ""
          echo "Packer templates failed: $FAIL"
          exit $FAIL
