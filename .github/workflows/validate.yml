# =============================================================================
# validate.yml — Syntax validation for every push and pull request
# =============================================================================
# Runs three checks automatically:
#   1. bash -n  — Shell script syntax (all .sh files)
#   2. ansible-playbook --syntax-check  — Ansible playbooks
#   3. packer validate  — Packer HCL templates
#
# These checks catch typos and syntax errors before they reach your lab.
# No credentials are needed — syntax checks don't connect to anything.
# =============================================================================

name: Validate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Shell script syntax check (bash -n)
  # ---------------------------------------------------------------------------
  bash-syntax:
    name: Shell script syntax (bash -n)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all .sh files
        run: |
          echo "Checking shell scripts..."
          FAIL=0
          while IFS= read -r f; do
            if bash -n "$f" 2>/tmp/bash_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/bash_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 2: Ansible syntax check
  # ---------------------------------------------------------------------------
  ansible-syntax:
    name: Ansible playbook syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ansible
          ansible --version

      - name: Check all playbooks
        run: |
          REPO="$(pwd)"
          FAIL=0
          while IFS= read -r f; do
            if ANSIBLE_ROLES_PATH="$REPO/automation/ansible/roles" \
               ansible-playbook --syntax-check "$f" 2>/tmp/ans_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/ans_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find automation/ansible/playbooks -name "*.yml" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 3: Packer validate
  # ---------------------------------------------------------------------------
  packer-validate:
    name: Packer template validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Validate all Packer templates
        # Strategy: validate each ubuntu-*.pkr.hcl in isolation by temporarily
        # renaming all other ubuntu-*.pkr.hcl files so Packer only sees one at
        # a time. This avoids "Duplicate local definition" errors that occur
        # when Packer merges all HCL files in the directory together, while
        # keeping relative paths (../../ansible/playbooks/) intact.
        working-directory: automation/packer
        env:
          # Proxmox and vSphere plugins reject empty-string passwords at
          # validate time — supply dummy non-empty values.
          PKR_VAR_proxmox_url:      "https://192.168.1.1:8006/api2/json"
          PKR_VAR_proxmox_node:     "pve"
          PKR_VAR_proxmox_username: "root@pam"
          PKR_VAR_proxmox_password: "dummy"
          PKR_VAR_vsphere_server:   "vcenter.example.com"
          PKR_VAR_vsphere_username: "administrator@vsphere.local"
          PKR_VAR_vsphere_password: "dummy"
          PKR_VAR_azure_subscription_id: "00000000-0000-0000-0000-000000000000"
          PKR_VAR_azure_client_id:       "00000000-0000-0000-0000-000000000000"
          PKR_VAR_azure_client_secret:   "dummy"
          PKR_VAR_azure_tenant_id:       "00000000-0000-0000-0000-000000000000"
        run: |
          FAIL=0

          for template in ubuntu-*.pkr.hcl; do
            echo ""
            echo "── Validating $template ──"

            # Hide every other ubuntu-*.pkr.hcl so packer sees only this one
            for other in ubuntu-*.pkr.hcl; do
              [ "$other" != "$template" ] && mv "$other" "$other.skip"
            done

            # Init installs the plugin(s) declared in this template's
            # required_plugins block (cached in ~/.config/packer across runs)
            if ! packer init . 2>/tmp/packer_err; then
              echo "  ✘  $template (init failed)"
              cat /tmp/packer_err
              FAIL=$((FAIL + 1))
            else
              if packer validate \
                   -var-file="environments/homelab.pkrvars.hcl" \
                   . 2>/tmp/packer_err; then
                echo "  ✔  $template"
              else
                echo "  ✘  $template"
                cat /tmp/packer_err
                FAIL=$((FAIL + 1))
              fi
            fi

            # Restore all hidden templates before the next iteration
            for bak in ubuntu-*.pkr.hcl.skip; do
              [ -f "$bak" ] && mv "$bak" "${bak%.skip}"
            done
          done

          echo ""
          echo "Packer templates failed: $FAIL"
          exit $FAIL
