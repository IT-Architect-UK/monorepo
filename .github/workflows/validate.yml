# =============================================================================
# validate.yml — Syntax validation for every push and pull request
# =============================================================================
# Runs three checks automatically:
#   1. bash -n  — Shell script syntax (all .sh files)
#   2. ansible-playbook --syntax-check  — Ansible playbooks
#   3. packer validate  — Each template in its own subdirectory
#
# Templates live in automation/packer/<template-name>/ — one directory per
# template — so Packer reads only that template's files. No hide/show hacks.
# =============================================================================

name: Validate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Shell script syntax check (bash -n)
  # ---------------------------------------------------------------------------
  bash-syntax:
    name: Shell script syntax (bash -n)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all .sh files
        run: |
          echo "Checking shell scripts..."
          FAIL=0
          while IFS= read -r f; do
            if bash -n "$f" 2>/tmp/bash_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/bash_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 2: Ansible syntax check
  # ---------------------------------------------------------------------------
  ansible-syntax:
    name: Ansible playbook syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ansible
          ansible --version

      - name: Check all playbooks
        run: |
          REPO="$(pwd)"
          FAIL=0
          while IFS= read -r f; do
            if ANSIBLE_ROLES_PATH="$REPO/automation/ansible/roles" \
               ansible-playbook --syntax-check "$f" 2>/tmp/ans_err; then
              echo "  ✔  $f"
            else
              echo "  ✘  $f"
              cat /tmp/ans_err
              FAIL=$((FAIL + 1))
            fi
          done < <(find automation/ansible/playbooks -name "*.yml" | sort)
          echo ""
          echo "Failed: $FAIL"
          exit $FAIL

  # ---------------------------------------------------------------------------
  # Job 3: Packer validate — one subdirectory per template
  # ---------------------------------------------------------------------------
  packer-validate:
    name: Packer template validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Validate all Packer templates
        working-directory: automation/packer
        env:
          PKR_VAR_proxmox_url:               "https://192.168.1.1:8006/api2/json"
          PKR_VAR_proxmox_node:              "pve"
          PKR_VAR_proxmox_username:          "root@pam"
          PKR_VAR_proxmox_password:          "dummy"
          PKR_VAR_vsphere_server:            "vcenter.example.com"
          PKR_VAR_vsphere_username:          "administrator@vsphere.local"
          PKR_VAR_vsphere_password:          "dummy"
          PKR_VAR_azure_subscription_id:     "00000000-0000-0000-0000-000000000000"
          PKR_VAR_gcp_project_id:            "dummy-project-000000"
          PKR_VAR_winrm_password:            "dummy"
          PKR_VAR_ubuntu_iso_file:           "local:iso/ubuntu-26.04-live-server-amd64.iso"
          PKR_VAR_semaphore_admin_password:  "dummy"
          PKR_VAR_cidata_iso_file:           "local:iso/ubuntu-2604-cidata.iso"
          PKR_VAR_ssh_password:              "dummy"
        run: |
          FAIL=0

          # Each template lives in its own subdirectory
          TEMPLATE_DIRS=(
            builds/ubuntu-2604-automation-toolbox
            builds/ubuntu-2604-proxmox
            builds/ubuntu-2604-vmware
            builds/ubuntu-2604-aws
            builds/ubuntu-2604-azure
            builds/ubuntu-2604-gcp
            builds/win2025-proxmox
            builds/win2025-vmware
          )

          for dir in "${TEMPLATE_DIRS[@]}"; do
            echo ""
            echo "── Validating $dir ──"

            pushd "$dir" > /dev/null

            if ! packer init . 2>/tmp/packer_err; then
              echo "  ✘  $dir (init failed)"
              cat /tmp/packer_err
              FAIL=$((FAIL + 1))
            else
              if packer validate \
                   -var-file="../../environments/homelab.pkrvars.hcl" \
                   . 2>/tmp/packer_err; then
                echo "  ✔  $dir"
              else
                echo "  ✘  $dir"
                cat /tmp/packer_err
                FAIL=$((FAIL + 1))
              fi
            fi

            popd > /dev/null
          done

          echo ""
          echo "Packer templates failed: $FAIL"
          exit $FAIL
