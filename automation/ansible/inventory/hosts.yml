---
# =============================================================================
# Ansible Inventory — hosts.yml
# =============================================================================
# This file tells Ansible which servers to manage and how to connect to them.
#
# Structure:
#   all:                  ← top-level group (all hosts are in this group)
#     children:
#       group_name:       ← logical group (web_servers, db_servers, etc.)
#         hosts:
#           hostname:     ← individual server
#             key: value  ← host-specific variables
#
# Tips:
#   - IP addresses work: ansible_host: 192.168.1.10
#   - DNS names work:    ansible_host: web01.lab.local
#   - Variables set here override group_vars but not extra-vars (-e)
#   - Run 'ansible all -m ping' to test connectivity to all hosts
#
# =============================================================================

all:
  children:

    # ── Web / application servers ────────────────────────────────────────
    web_servers:
      hosts:
        web01:
          ansible_host: 192.168.1.11
        web02:
          ansible_host: 192.168.1.12

    # ── Database servers ─────────────────────────────────────────────────
    db_servers:
      hosts:
        db01:
          ansible_host: 192.168.1.21

    # ── Docker / container hosts ─────────────────────────────────────────
    docker_hosts:
      hosts:
        docker01:
          ansible_host: 192.168.1.31
          docker_users:
            - sysadmin
            - ubuntu

    # ── Windows servers (WinRM connection) ───────────────────────────────
    windows_servers:
      hosts:
        win01:
          ansible_host: 192.168.1.41
          ansible_connection: winrm
          ansible_winrm_transport: credssp
          ansible_winrm_server_cert_validation: ignore
      vars:
        ansible_port: 5985

    # ── All Linux servers combined ────────────────────────────────────────
    linux_servers:
      children:
        web_servers:
        db_servers:
        docker_hosts:

  # ── Variables for ALL hosts ───────────────────────────────────────────
  vars:
    ansible_user: sysadmin
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    # Become (sudo) settings
    ansible_become: true
    ansible_become_method: sudo
