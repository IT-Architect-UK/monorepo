---
# =============================================================================
# roles/common/tasks/main.yml
# =============================================================================
# Baseline tasks applied to every managed Linux server.
# Called by server-baseline.yml
# =============================================================================

- name: Update package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: packages

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  tags: packages

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
  tags: packages

- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone }}"
  tags: timezone

- name: Configure NTP
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    mode: "0644"
  notify: Restart timesyncd
  tags: ntp

# Baked-in accounts conflict with the clone-identity model (users arrive
# per-clone via cloud-init) — off by default, enable via group_vars for
# standing servers that want a fixed admin account.
- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: "{{ admin_groups }}"
    shell: /bin/bash
    create_home: true
    state: present
  when: baseline_create_admin | default(false) | bool
  tags: users

- name: Harden SSH configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH
  tags: ssh

# ── Firewall — iptables ───────────────────────────────────────────────────────
# Uses setup-iptables.sh from infrastructure/networking/firewall/ which applies
# a default-drop INPUT policy and allows all RFC-1918 private subnet traffic.
# Managed via Webmin post-deployment for role-specific rule additions.

- name: Copy iptables setup script to target
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../infrastructure/networking/firewall/setup-iptables.sh"
    dest: /tmp/setup-iptables.sh
    mode: "0755"
  when: baseline_firewall | default(true) | bool
  tags: firewall

- name: Apply iptables baseline ruleset
  ansible.builtin.command: /tmp/setup-iptables.sh
  args:
    creates: /etc/iptables/rules.v4
  when: baseline_firewall | default(true) | bool
  tags: firewall

- name: Remove iptables setup script
  ansible.builtin.file:
    path: /tmp/setup-iptables.sh
    state: absent
  when: baseline_firewall | default(true) | bool
  tags: firewall

# ── fail2ban ──────────────────────────────────────────────────────────────────
- name: Configure fail2ban (SSH brute-force protection)
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = {{ fail2ban_bantime | default(3600) }}
      findtime = {{ fail2ban_findtime | default(600) }}
      maxretry = {{ fail2ban_maxretry | default(5) }}

      [sshd]
      enabled = true
      port    = {{ ssh_port | default(22) }}
    mode: "0644"
  notify: Restart fail2ban
  when: baseline_fail2ban | default(true) | bool
  tags: security

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: baseline_fail2ban | default(true) | bool
  tags: security

# Handlers (Restart SSH / Restart timesyncd / Restart fail2ban) live in
# roles/common/handlers/main.yml -- Ansible loads that automatically.

# ── Optional site flavour (all default OFF — lean golden baseline) ──────────
# Enable per site in inventory/group_vars/all.yml. Each reuses the standalone
# script from this repo, so behaviour is identical to running it by hand.

- name: Apply server branding (baseline_branding)
  ansible.builtin.script: "{{ playbook_dir }}/../../../infrastructure/servers/linux/configuration/apply-branding.sh --company {{ branding_company | default('IT-Architect') | quote }} --colour Cyan --non-interactive"
  when: baseline_branding | default(false) | bool
  tags: branding

- name: Disable IPv6 system-wide (baseline_disable_ipv6)
  ansible.builtin.script: "{{ playbook_dir }}/../../../infrastructure/servers/linux/configuration/disable-ipv6.sh"
  when: baseline_disable_ipv6 | default(false) | bool
  tags: ipv6

- name: Install monorepo sync (baseline_monorepo_clone)
  ansible.builtin.script: "{{ playbook_dir }}/../../../infrastructure/servers/linux/configuration/sync-monorepo.sh"
  when: baseline_monorepo_clone | default(false) | bool
  tags: monorepo
