---
# =============================================================================
# roles/monitoring-agent/tasks/main.yml
# =============================================================================
# Installs Prometheus node_exporter — a system metrics exporter.
#
# node_exporter exposes metrics at http://<host>:9100/metrics in a format
# that Prometheus can scrape. Grafana then visualises these metrics.
#
# Metrics exposed: CPU, memory, disk, network, filesystem, processes, etc.
#
# Cloud equivalents:
#   AWS   → CloudWatch Agent
#   Azure → Azure Monitor Agent
#   GCP   → Google Cloud Ops Agent
# =============================================================================

- name: Set node_exporter version
  ansible.builtin.set_fact:
    node_exporter_version: "{{ node_exporter_version | default('1.8.1') }}"

- name: Create node_exporter system user
  # System users have no login shell and no home directory — security best practice
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Download node_exporter binary
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: true

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    owner: node_exporter
    group: node_exporter
    remote_src: true
  notify: Restart node_exporter

- name: Create node_exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --collector.systemd \
        --collector.processes
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Open firewall port for node_exporter
  community.general.ufw:
    rule: allow
    port: 9100
    proto: tcp
    comment: "Prometheus node_exporter"
  when: ansible_os_family == "Debian"

- name: Verify node_exporter is responding
  ansible.builtin.uri:
    url: "http://localhost:9100/metrics"
    status_code: 200
  register: metrics_check
  retries: 3
  delay: 5

- name: Display status
  ansible.builtin.debug:
    msg: "✔ node_exporter is running on {{ inventory_hostname }}:9100"
