---
# =============================================================================
# provision-vm.yml
# =============================================================================
# Provisions a new VM on Proxmox VE by cloning an existing template, then
# sizing and starting it. Runs entirely from the control node (localhost) —
# no SSH access to the new VM is required.
#
# What this playbook does:
#   1. Clones the named Proxmox template to a new VM (full clone)
#   2. Sets vCPU count and memory
#   3. Optionally overrides the network bridge / VLAN tag
#   4. Optionally grows the OS disk
#   5. Starts the VM and reports the outcome
#
# Designed to be driven from a Semaphore Job Template with Survey Variables
# (created by the toolbox bootstrap script), but works equally from the CLI.
#
# Required variables (Survey or -e):
#   vm_name          Name for the new VM
#   vm_template      Name of the Proxmox template to clone
#
# Optional variables:
#   vm_user          Login account created on the clone via cloud-init
#   vm_password      Password for that account (survey 'secret' field)
#   vm_ssh_key       SSH public key for that account (default: the toolbox's
#                    provisioning key, so Semaphore playbooks can reach the VM)
#   apply_standard   true|false — after the VM boots, apply the standard
#                    build defined in inventory/group_vars/standard.yml
#                    (branding, firewall, fail2ban, Webmin, ...)
#   vm_vcpu          vCPU count                    (default: 2)
#   vm_memory_mb     Memory in MB                  (default: 4096)
#   vm_disk_gb       Grow OS disk to this size GB  (default: 0 = keep template size)
#   vm_vlan_tag      VLAN tag for net0             (default: keep template setting)
#   vm_bridge        Bridge for net0               (default: VLANs; only used with vm_vlan_tag)
#   vm_storage       Target storage for the clone  (default: keep template storage)
#   proxmox_node     Proxmox node name             (from PROXMOX_NODE env var — set
#                    by the Semaphore 'Proxmox' variable group; required)
#
# Proxmox connection (set by the Semaphore "Proxmox" variable group, or env):
#   PROXMOX_HOST           API host/IP (no scheme, no port)
#   PROXMOX_USER           e.g. root@pam or automation@pve
#   PROXMOX_TOKEN_ID       API token ID    (token auth — recommended)
#   PROXMOX_TOKEN_SECRET   API token secret
#   PROXMOX_PASSWORD       Password (only if not using token auth)
#
# Usage:
#   ansible-playbook playbooks/provision-vm.yml \
#     -e vm_name=POSLXPTEST01 -e vm_template=T-UBUNTU-24-DEPLOY \
#     -e vm_vcpu=2 -e vm_memory_mb=4096
#
# Requirements: community.proxmox collection, python3-proxmoxer (both baked
# into the toolbox image).
# =============================================================================

- name: Provision a VM on Proxmox VE from a template
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    proxmox_api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
    proxmox_api_user: "{{ lookup('env', 'PROXMOX_USER') | default('root@pam', true) }}"
    proxmox_api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
    proxmox_api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
    proxmox_api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
    proxmox_node: "{{ lookup('env', 'PROXMOX_NODE') }}"
    vm_user: ""
    vm_password: ""
    # Defaults to the toolbox's provisioning public key (published by the
    # bootstrap as PROVISION_SSH_PUBKEY) so follow-up playbooks can connect.
    vm_ssh_key: "{{ lookup('env', 'PROVISION_SSH_PUBKEY') }}"
    apply_standard: false
    # ── Per-OS "Deploy VM" support (set by the Deploy <OS> VM templates) ──
    golden_vmid: ""             # clone source by VMID (resolved to its name below)
    vm_ip_cidr: ""              # static IP e.g. 192.168.4.50/24 (blank = DHCP)
    vm_gateway: ""              # blank = .1 of the vm_ip_cidr subnet
    cloudinit_ip: true          # false for images without cloud-init (Windows for now)
    register_inventory_id: ""   # Semaphore inventory id to register the new host in
    os_label: ""                # informational: ubuntu-2404 / ubuntu-2604 / windows
    semaphore_url: "{{ lookup('env', 'SEMAPHORE_URL') | default('http://127.0.0.1:3000', true) }}"
    semaphore_api_token: "{{ lookup('env', 'SEMAPHORE_API_TOKEN') }}"
    semaphore_project_id: "{{ lookup('env', 'SEMAPHORE_PROJECT_ID') }}"
    vm_vcpu: 2
    vm_memory_mb: 4096
    vm_disk_gb: 0
    vm_vlan_tag: ""
    vm_bridge: "VLANs"
    vm_storage: ""
    clone_timeout: 600

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - vm_name is defined and vm_name | length > 0
          - (vm_template is defined and vm_template | length > 0) or (golden_vmid | string | length > 0)
          - proxmox_api_host | length > 0
          - proxmox_node | length > 0
          - (proxmox_api_token_secret | length > 0) or (proxmox_api_password | length > 0)
        fail_msg: >-
          vm_name and vm_template must be set, and Proxmox connection details
          (PROXMOX_HOST plus token or password) must be present in the
          environment. In Semaphore these come from the 'Proxmox' variable group.

    - name: "Resolve the golden template name from VMID {{ golden_vmid }}"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ golden_vmid }}/config"
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: false
      register: golden_cfg
      when: golden_vmid | string | length > 0

    - name: "Use the golden template (VMID {{ golden_vmid }}) as the clone source"
      ansible.builtin.set_fact:
        vm_template: "{{ golden_cfg.json.data.name }}"
      when: golden_vmid | string | length > 0

    - name: "Clone template '{{ vm_template }}' to new VM '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        clone: "{{ vm_template }}"
        name: "{{ vm_name }}"
        full: true
        storage: "{{ vm_storage | default(omit, true) }}"
        timeout: "{{ clone_timeout }}"
        state: present
      register: clone_result

    - name: "Look up the new VM's ID"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/cluster/resources?type=vm"
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: false
      register: cluster_vms

    - name: "Record the new VM's ID"
      ansible.builtin.set_fact:
        new_vmid: "{{ cluster_vms.json.data | selectattr('name', 'equalto', vm_name) | map(attribute='vmid') | map('int') | max }}"

    # ── Move the cloud-init drive to SCSI ────────────────────────────────────
    # Packer creates the template's cloud-init drive on IDE, which this machine
    # type does NOT present to the guest — cloud-init then finds no datasource
    # and disables itself (no hostname/user/password applied). Re-create it on
    # SCSI, where it works. (Linux only; Windows has no cloud-init yet.)
    - name: "Read the clone's config (find its cloud-init drive + disk storage)"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/config"
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: false
      register: clone_cfg
      when: cloudinit_ip | bool

    - name: "Identify the inherited cloud-init drive and the disk's storage"
      ansible.builtin.set_fact:
        old_ci_key: "{{ (clone_cfg.json.data | dict2items | selectattr('value', 'string') | selectattr('value', 'search', 'cloudinit') | map(attribute='key') | list | first) | default('') }}"
        ci_storage: "{{ (clone_cfg.json.data.scsi0 | default('') | regex_replace(':.*$', '')) | default(vm_storage, true) }}"
      when: cloudinit_ip | bool

    - name: "Remove the inherited (IDE) cloud-init drive"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/config"
        method: PUT
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        body_format: form-urlencoded
        body:
          delete: "{{ old_ci_key }}"
        validate_certs: false
      when: cloudinit_ip | bool and (old_ci_key | length > 0)

    - name: "Attach the cloud-init drive on SCSI (scsi1)"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/config"
        method: PUT
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        body_format: form-urlencoded
        body:
          scsi1: "{{ ci_storage }}:cloudinit"
        validate_certs: false
      when: cloudinit_ip | bool

    - name: "Determine login account (survey, else DEPLOY_ADMIN_* / it-admin)"
      ansible.builtin.set_fact:
        eff_user: "{{ vm_user | default(lookup('env', 'DEPLOY_ADMIN_USER'), true) | default('it-admin', true) }}"
        eff_password: "{{ vm_password | default(lookup('env', 'DEPLOY_ADMIN_PASSWORD'), true) }}"
        # Toolbox provisioning key is ALWAYS included (so Semaphore can SSH in
        # for follow-up customisation), plus any key the user supplied.
        eff_ssh_key: "{{ [lookup('env', 'PROVISION_SSH_PUBKEY'), (vm_ssh_key | default(''))] | select('ne', '') | join('\n') }}"

    - name: "Set vCPU and memory on '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ new_vmid }}"
        cores: "{{ vm_vcpu | int }}"
        memory: "{{ vm_memory_mb | int }}"
        ciuser: "{{ eff_user | default(omit, true) }}"
        cipassword: "{{ eff_password | default(omit, true) }}"
        update: true

    - name: "Set cloud-init SSH key (raw API — module + form encoder mangle it)"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/config"
        method: PUT
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        # Proxmox wants sshkeys as a FULLY URL-encoded string. Jinja's
        # urlencode leaves "/" unescaped, which Proxmox rejects, so also encode
        # "/" -> %2F. JSON body delivers the value verbatim (no form re-encode).
        body:
          sshkeys: "{{ eff_ssh_key | trim | urlencode | replace('/', '%2F') }}"
        body_format: json
        validate_certs: false
      when: eff_ssh_key | length > 0

    - name: "Compute the effective gateway (default: .1 of the subnet)"
      ansible.builtin.set_fact:
        vm_gw_effective: >-
          {{ vm_gateway if (vm_gateway | length > 0)
             else (vm_ip_cidr.split('/')[0].rsplit('.', 1)[0] ~ '.1') }}
      when: vm_ip_cidr | length > 0

    - name: "Set cloud-init network ({{ (vm_ip_cidr | length > 0) | ternary('static ' ~ vm_ip_cidr, 'DHCP') }})"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ new_vmid }}"
        ipconfig:
          ipconfig0: >-
            {{ ('ip=' ~ vm_ip_cidr ~ ',gw=' ~ vm_gw_effective)
               if (vm_ip_cidr | length > 0) else 'ip=dhcp' }}
        update: true
      when: cloudinit_ip | bool

    # Set net0 via the raw API: idempotent (the golden may already carry this
    # VLAN, and the module 500s with "no options specified" on a no-op update).
    - name: "Apply VLAN tag {{ vm_vlan_tag }} to net0"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/config"
        method: PUT
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        body_format: json
        body:
          net0: "virtio,bridge={{ vm_bridge }},tag={{ vm_vlan_tag }}"
        validate_certs: false
      when: vm_vlan_tag | string | length > 0

    - name: "Grow OS disk to {{ vm_disk_gb }}G"
      community.proxmox.proxmox_disk:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        validate_certs: false
        vmid: "{{ new_vmid }}"
        disk: scsi0
        size: "{{ vm_disk_gb | int }}G"
        state: resized
      when: vm_disk_gb | int > 0

    - name: "Start '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ new_vmid }}"
        state: started

    - name: "Wait for the VM to report its IP (QEMU guest agent — up to 5 min)"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ new_vmid }}/agent/network-get-interfaces"
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: false
      register: agent_net
      retries: 30
      delay: 10
      until: >-
        agent_net.status == 200 and
        (agent_net.json.data.result | default([])
         | selectattr('name', 'ne', 'lo')
         | map(attribute='ip-addresses', default=[]) | flatten
         | selectattr('ip-address-type', 'eq', 'ipv4')
         | map(attribute='ip-address')
         | reject('match', '^127\.') | list | length > 0)
      when: proxmox_api_token_secret | length > 0

    - name: "Record the VM's IP"
      ansible.builtin.set_fact:
        vm_ip: >-
          {{ agent_net.json.data.result | default([])
             | selectattr('name', 'ne', 'lo')
             | map(attribute='ip-addresses', default=[]) | flatten
             | selectattr('ip-address-type', 'eq', 'ipv4')
             | map(attribute='ip-address')
             | reject('match', '^127\.') | first | default('') }}
      when: agent_net is not skipped

    - name: "Register '{{ vm_name }}' in the per-OS Semaphore inventory (best-effort)"
      when:
        - register_inventory_id | string | length > 0
        - (vm_ip | default('')) | length > 0
        - semaphore_api_token | length > 0
      block:
        - name: "Fetch inventory {{ register_inventory_id }}"
          ansible.builtin.uri:
            url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/inventory/{{ register_inventory_id }}"
            headers:
              Authorization: "Bearer {{ semaphore_api_token }}"
            validate_certs: false
          register: _inv

        - name: "Append {{ vm_name }} (skip if already present)"
          ansible.builtin.uri:
            url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/inventory/{{ register_inventory_id }}"
            method: PUT
            headers:
              Authorization: "Bearer {{ semaphore_api_token }}"
            body_format: json
            body: >-
              {{ _inv.json | combine({'inventory':
                 ((_inv.json.inventory | default('')) | trim ~ '\n' ~ vm_name ~ ' ansible_host=' ~ vm_ip) | trim }) }}
            status_code: [200, 204]
            validate_certs: false
          when: (vm_name ~ ' ansible_host=' ~ vm_ip) not in (_inv.json.inventory | default(''))
        - name: "Registered in inventory"
          ansible.builtin.debug:
            msg: "{{ vm_name }} ({{ vm_ip }}) registered in Semaphore inventory {{ register_inventory_id }}."
      rescue:
        - ansible.builtin.debug:
            msg: "Could not register {{ vm_name }} in inventory {{ register_inventory_id }} — add it by hand or check SEMAPHORE_API_TOKEN / SEMAPHORE_PROJECT_ID."

    - name: "Queue the standard build"
      ansible.builtin.add_host:
        name: "{{ vm_ip }}"
        groups: standard
        ansible_user: "{{ vm_user | default('sysadmin', true) }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      when: apply_standard | bool and (vm_ip | default('')) | length > 0

    - name: Provisioning summary
      ansible.builtin.debug:
        msg:
          - "VM '{{ vm_name }}' cloned from '{{ vm_template }}' and started on {{ proxmox_node }}."
          - "vCPU: {{ vm_vcpu }}  Memory: {{ vm_memory_mb }} MB  Disk: {{ (vm_disk_gb | int > 0) | ternary(vm_disk_gb ~ 'G', 'template default') }}"
          - "Network: {{ (vm_vlan_tag | string | length > 0) | ternary('net0 on ' ~ vm_bridge ~ ' tag ' ~ vm_vlan_tag, 'template default') }}"
          - "Login: {{ eff_user }}{{ (eff_password | default('') | length > 0) | ternary(' (password set via cloud-init)', ' (SSH key only — no password)') }}"
          - "IP address: {{ vm_ip | default('not yet reported — check the Proxmox console') }} ({{ (vm_ip_cidr | length > 0) | ternary('static', 'DHCP') if cloudinit_ip | bool else 'image default (no cloud-init)' }})"
          - "Inventory: {{ (register_inventory_id | string | length > 0) | ternary('registered in Semaphore inventory ' ~ register_inventory_id, 'not registered') }}"

# ── The standard build (only when apply_standard=true) ───────────────────────
# Everything in inventory/group_vars/standard.yml, applied to the fresh VM.
- name: Apply the standard build
  hosts: standard
  become: true
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/standard.yml
  pre_tasks:
    - name: Wait for the VM to accept SSH (cloud-init may still be creating the login)
      ansible.builtin.wait_for_connection:
        timeout: 300
        sleep: 10
    - name: Gather facts
      ansible.builtin.setup:
  tasks:
    - name: Apply the common baseline (branding, tools, OS settings, firewall, fail2ban)
      ansible.builtin.include_role:
        name: common
  post_tasks:
    - name: Install Webmin (standard_webmin)
      ansible.builtin.script: ../../../applications/webmin/install-webmin.sh
      when: standard_webmin | default(false) | bool

    - name: Standard build summary
      ansible.builtin.debug:
        msg: "Standard build applied to {{ inventory_hostname }}{{ (standard_webmin | default(false) | bool) | ternary(' — Webmin at https://' ~ inventory_hostname ~ ':10000', '') }}"
