---
# =============================================================================
# provision-vm.yml
# =============================================================================
# Provisions a new VM on Proxmox VE by cloning an existing template, then
# sizing and starting it. Runs entirely from the control node (localhost) —
# no SSH access to the new VM is required.
#
# What this playbook does:
#   1. Clones the named Proxmox template to a new VM (full clone)
#   2. Sets vCPU count and memory
#   3. Optionally overrides the network bridge / VLAN tag
#   4. Optionally grows the OS disk
#   5. Starts the VM and reports the outcome
#
# Designed to be driven from a Semaphore Job Template with Survey Variables
# (created by the toolbox bootstrap script), but works equally from the CLI.
#
# Required variables (Survey or -e):
#   vm_name          Name for the new VM
#   vm_template      Name of the Proxmox template to clone
#
# Optional variables:
#   vm_user          Login account created on the clone via cloud-init
#   vm_password      Password for that account (survey 'secret' field)
#   vm_ssh_key       SSH public key for that account (default: the toolbox's
#                    provisioning key, so Semaphore playbooks can reach the VM)
#   apply_standard   true|false — after the VM boots, apply the standard
#                    build defined in inventory/group_vars/standard.yml
#                    (branding, firewall, fail2ban, Webmin, ...)
#   vm_vcpu          vCPU count                    (default: 2)
#   vm_memory_mb     Memory in MB                  (default: 4096)
#   vm_disk_gb       Grow OS disk to this size GB  (default: 0 = keep template size)
#   vm_vlan_tag      VLAN tag for net0             (default: keep template setting)
#   vm_bridge        Bridge for net0               (default: VLANs; only used with vm_vlan_tag)
#   vm_storage       Target storage for the clone  (default: keep template storage)
#   proxmox_node     Proxmox node name             (from PROXMOX_NODE env var — set
#                    by the Semaphore 'Proxmox' variable group; required)
#
# Proxmox connection (set by the Semaphore "Proxmox" variable group, or env):
#   PROXMOX_HOST           API host/IP (no scheme, no port)
#   PROXMOX_USER           e.g. root@pam or automation@pve
#   PROXMOX_TOKEN_ID       API token ID    (token auth — recommended)
#   PROXMOX_TOKEN_SECRET   API token secret
#   PROXMOX_PASSWORD       Password (only if not using token auth)
#
# Usage:
#   ansible-playbook playbooks/provision-vm.yml \
#     -e vm_name=POSLXPTEST01 -e vm_template=T-UBUNTU-24-DEPLOY \
#     -e vm_vcpu=2 -e vm_memory_mb=4096
#
# Requirements: community.proxmox collection, python3-proxmoxer (both baked
# into the toolbox image).
# =============================================================================

- name: Provision a VM on Proxmox VE from a template
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    proxmox_api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
    proxmox_api_user: "{{ lookup('env', 'PROXMOX_USER') | default('root@pam', true) }}"
    proxmox_api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
    proxmox_api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
    proxmox_api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
    proxmox_node: "{{ lookup('env', 'PROXMOX_NODE') }}"
    vm_user: ""
    vm_password: ""
    # Defaults to the toolbox's provisioning public key (published by the
    # bootstrap as PROVISION_SSH_PUBKEY) so follow-up playbooks can connect.
    vm_ssh_key: "{{ lookup('env', 'PROVISION_SSH_PUBKEY') }}"
    apply_standard: false
    vm_vcpu: 2
    vm_memory_mb: 4096
    vm_disk_gb: 0
    vm_vlan_tag: ""
    vm_bridge: "VLANs"
    vm_storage: ""
    clone_timeout: 600

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - vm_name is defined and vm_name | length > 0
          - vm_template is defined and vm_template | length > 0
          - proxmox_api_host | length > 0
          - proxmox_node | length > 0
          - (proxmox_api_token_secret | length > 0) or (proxmox_api_password | length > 0)
        fail_msg: >-
          vm_name and vm_template must be set, and Proxmox connection details
          (PROXMOX_HOST plus token or password) must be present in the
          environment. In Semaphore these come from the 'Proxmox' variable group.

    - name: "Clone template '{{ vm_template }}' to new VM '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        node: "{{ proxmox_node }}"
        clone: "{{ vm_template }}"
        name: "{{ vm_name }}"
        full: true
        storage: "{{ vm_storage | default(omit, true) }}"
        timeout: "{{ clone_timeout }}"
        state: present
      register: clone_result

    - name: "Set vCPU and memory on '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        node: "{{ proxmox_node }}"
        name: "{{ vm_name }}"
        cores: "{{ vm_vcpu | int }}"
        memory: "{{ vm_memory_mb | int }}"
        ciuser: "{{ vm_user | default(omit, true) }}"
        cipassword: "{{ vm_password | default(omit, true) }}"
        sshkeys: "{{ vm_ssh_key | default(omit, true) }}"
        update: true

    - name: "Apply VLAN tag {{ vm_vlan_tag }} to net0"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        node: "{{ proxmox_node }}"
        name: "{{ vm_name }}"
        net:
          net0: "virtio,bridge={{ vm_bridge }},tag={{ vm_vlan_tag }}"
        update: true
      when: vm_vlan_tag | string | length > 0

    - name: "Grow OS disk to {{ vm_disk_gb }}G"
      community.proxmox.proxmox_disk:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        name: "{{ vm_name }}"
        disk: scsi0
        size: "{{ vm_disk_gb | int }}G"
        state: resized
      when: vm_disk_gb | int > 0

    - name: "Start '{{ vm_name }}'"
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        node: "{{ proxmox_node }}"
        name: "{{ vm_name }}"
        state: started

    - name: "Look up the new VM's ID"
      community.proxmox.proxmox_vm_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id | default(omit, true) }}"
        api_token_secret: "{{ proxmox_api_token_secret | default(omit, true) }}"
        api_password: "{{ proxmox_api_password | default(omit, true) }}"
        node: "{{ proxmox_node }}"
        name: "{{ vm_name }}"
      register: vm_info

    - name: "Wait for the VM to report its IP (QEMU guest agent — up to 5 min)"
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ proxmox_node }}/qemu/{{ vm_info.proxmox_vms[0].vmid }}/agent/network-get-interfaces"
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: false
      register: agent_net
      retries: 30
      delay: 10
      until: >-
        agent_net.status == 200 and
        (agent_net.json.data.result | default([])
         | selectattr('name', 'ne', 'lo')
         | map(attribute='ip-addresses', default=[]) | flatten
         | selectattr('ip-address-type', 'eq', 'ipv4')
         | map(attribute='ip-address')
         | reject('match', '^127\.') | list | length > 0)
      when: proxmox_api_token_secret | length > 0

    - name: "Record the VM's IP"
      ansible.builtin.set_fact:
        vm_ip: >-
          {{ agent_net.json.data.result | default([])
             | selectattr('name', 'ne', 'lo')
             | map(attribute='ip-addresses', default=[]) | flatten
             | selectattr('ip-address-type', 'eq', 'ipv4')
             | map(attribute='ip-address')
             | reject('match', '^127\.') | first | default('') }}
      when: agent_net is not skipped

    - name: "Queue the standard build"
      ansible.builtin.add_host:
        name: "{{ vm_ip }}"
        groups: standard
        ansible_user: "{{ vm_user | default('sysadmin', true) }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      when: apply_standard | bool and (vm_ip | default('')) | length > 0

    - name: Provisioning summary
      ansible.builtin.debug:
        msg:
          - "VM '{{ vm_name }}' cloned from '{{ vm_template }}' and started on {{ proxmox_node }}."
          - "vCPU: {{ vm_vcpu }}  Memory: {{ vm_memory_mb }} MB  Disk: {{ (vm_disk_gb | int > 0) | ternary(vm_disk_gb ~ 'G', 'template default') }}"
          - "Network: {{ (vm_vlan_tag | string | length > 0) | ternary('net0 on ' ~ vm_bridge ~ ' tag ' ~ vm_vlan_tag, 'template default') }}"
          - "Login: {{ (vm_user | length > 0) | ternary(vm_user ~ ' (set via cloud-init on first boot)', 'none set — pass vm_user/vm_password/vm_ssh_key to create one') }}"
          - "IP address: {{ vm_ip | default('not yet reported — check the Proxmox console') }}"

# ── The standard build (only when apply_standard=true) ───────────────────────
# Everything in inventory/group_vars/standard.yml, applied to the fresh VM.
- name: Apply the standard build
  hosts: standard
  become: true
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/standard.yml
  pre_tasks:
    - name: Wait for the VM to accept SSH (cloud-init may still be creating the login)
      ansible.builtin.wait_for_connection:
        timeout: 300
        sleep: 10
    - name: Gather facts
      ansible.builtin.setup:
  roles:
    - role: common
  post_tasks:
    - name: Install Webmin (standard_webmin)
      ansible.builtin.script: ../../../applications/webmin/install-webmin.sh
      when: standard_webmin | default(false) | bool

    - name: Standard build summary
      ansible.builtin.debug:
        msg: "Standard build applied to {{ inventory_hostname }}{{ (standard_webmin | default(false) | bool) | ternary(' — Webmin at https://' ~ inventory_hostname ~ ':10000', '') }}"
