---
# =============================================================================
# server-baseline.yml  —  THE DEFAULT BUILD
# =============================================================================
# The canonical "default build" applied to every managed Linux server:
#   - common role: package update/upgrade, common utilities, timezone/NTP,
#     SSH hardening, iptables default-drop firewall, fail2ban, optional branding
#   - Webmin (web admin UI on :10000) when standard_webmin is true
#   - (extend below — future default-build items go here)
#
# What it applies is driven by toggles in group_vars/standard.yml, so "the
# default build" has ONE definition used both inline at deploy time
# (provision-vm.yml) and by the "Apply Baseline (Linux)" Semaphore template.
#
# Two ways to target hosts:
#   * Inventory mode (Semaphore template bound to the "Linux Baseline"
#     inventory): leave target_host unset — applies to all hosts in the
#     inventory (or a subset via target_hosts).
#   * Single-host mode (survey): set target_host to an IP/FQDN.
#
# Usage (CLI):
#   ansible-playbook -i inventory/hosts.yml playbooks/server-baseline.yml
#   ansible-playbook playbooks/server-baseline.yml -e target_host=192.168.4.60
#
# Variables (group_vars/all.yml + group_vars/standard.yml, or -e):
#   target_host       single IP/FQDN to target (optional)
#   target_ssh_user   SSH user for single-host mode (default: it-admin)
#   target_hosts      inventory group to target (default: all)
#   standard_webmin   install Webmin as part of the default build (default: true)
# =============================================================================

- name: "Register single target (survey mode only)"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add target_host to the baseline_target group
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: baseline_target
        ansible_user: "{{ target_ssh_user | default('it-admin', true) }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      when: target_host is defined and (target_host | length > 0)

- name: Apply the default build (baseline + Webmin)
  hosts: >-
    {{ (target_host is defined and (target_host | length > 0))
       | ternary('baseline_target', target_hosts | default('all')) }}
  become: true
  gather_facts: true
  # Semaphore does not auto-load the inventory group_vars, so load them
  # explicitly — the common role needs common_packages, system_timezone, etc.
  vars_files:
    - ../inventory/group_vars/all.yml
    - ../inventory/group_vars/standard.yml

  roles:
    - role: common

  post_tasks:
    - name: Install Webmin (standard_webmin)
      ansible.builtin.include_role:
        name: webmin
      when: standard_webmin | default(true) | bool

    # -- Extend the default build here ------------------------------------
    # Add further default-build roles/tasks below, each gated by a toggle in
    # group_vars/standard.yml, so every managed host picks them up on the next
    # run of this playbook (redeploy or the "Apply Baseline (Linux)" template).

    - name: Verify SSH is running
      ansible.builtin.service:
        name: ssh
        state: started
        enabled: true

    - name: Default build summary
      ansible.builtin.debug:
        msg: >-
          Default build applied to {{ inventory_hostname }}{{
          (standard_webmin | default(true) | bool)
          | ternary(' — Webmin https://' ~ inventory_hostname ~ ':10000', '') }}
