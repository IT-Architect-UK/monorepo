---
# =============================================================================
# windows-baseline.yml — THE WINDOWS DEFAULT BUILD (menu)
# =============================================================================
# Applies THE default build to Windows servers over WinRM: disk layout,
# Chocolatey + the standard app set, branding, and the Windows Server Backup
# feature. Users wanting only some items run the individual task templates
# instead — this playbook is deliberately not a menu.
#
# Standard apps (override with choco_packages):
#   powershell-core, putty, 7zip, sysinternals, dotnetfx, git, terraform, notepadplusplus
# =============================================================================

- name: Register single target (survey mode)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add target_host to the win_target group
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: win_target
      when: target_host is defined and (target_host | length > 0)

- name: Apply the Windows default build
  hosts: "{{ (target_host is defined and (target_host | length > 0)) | ternary('win_target', target_hosts | default('all')) }}"
  gather_facts: false
  vars:
    ansible_user: "{{ target_user | default(lookup('env', 'DEPLOY_ADMIN_USER'), true) | default('it-admin', true) }}"
    ansible_password: "{{ target_password | default(lookup('env', 'DEPLOY_ADMIN_PASSWORD'), true) }}"
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    win_choco_packages: "{{ (choco_packages | default('powershell-core,putty,7zip,sysinternals,dotnetfx,git,terraform,notepadplusplus', true)).split(',') | map('trim') | list }}"
  tasks:
    - name: Disk layout
      ansible.builtin.include_tasks: includes/windows/disks.yml
    - name: Chocolatey + applications
      ansible.builtin.include_tasks: includes/windows/chocolatey.yml
    - name: Branding
      ansible.builtin.include_tasks: includes/windows/branding.yml
    - name: Windows Server Backup feature
      ansible.builtin.include_tasks: includes/windows/backup.yml
